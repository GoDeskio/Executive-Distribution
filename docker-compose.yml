version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MONGO_URL: "mongodb://mongo:27017"
      STORAGE_BACKEND: "local"
      LOCAL_STORAGE_DIR: "/app/backend/uploads"
    volumes:
      - uploads_data:/app/backend/uploads
    depends_on:
      - mongo
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
      args:
        # Change to your public backend URL in production
        REACT_APP_BACKEND_URL: "http://localhost:8001"
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mongo_data:
  uploads_data:
