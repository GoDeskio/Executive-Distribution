# Executive Distribution — production reverse proxy
#
# Puts the React frontend and FastAPI backend behind a single origin and adds
# clean root-level rewrites for /sitemap.xml and /robots.txt so search engines
# find them at the canonical location (they are generated by the backend under
# /api/sitemap.xml and /api/robots.txt).
#
# Usage: place in front of the `frontend` (:3000) and `backend` (:8001) services.
# See the `proxy` service in docker-compose.yml.

upstream ed_frontend {
    server frontend:3000;
}
upstream ed_backend {
    server backend:8001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # SEO files at the root -> backend generators
    location = /sitemap.xml {
        proxy_pass http://ed_backend/api/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /robots.txt {
        proxy_pass http://ed_backend/api/robots.txt;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API -> backend
    location /api/ {
        proxy_pass http://ed_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;               # keep AI streaming responsive
        proxy_read_timeout 300s;
    }

    # Everything else -> frontend
    location / {
        proxy_pass http://ed_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
